general {
  gaps_in = 5
  gaps_out = 10

  border_size = 0
  col.active_border = rgba(eadab1ff)
  col.inactive_border = rgba(918273ff)

  allow_tearing = false
}

decoration {
  rounding = 0
  rounding_power = 0

  active_opacity = 0.9
  inactive_opacity = 0.8

  shadow {
    enabled = true
    range = 10
    render_power = 6
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 1
    passes = 3

    vibrancy = 0.1696
  }
}

animations {
  enabled = false
}

cursor {
  inactive_timeout = 1
  hide_on_key_press = true
  zoom_detached_camera = false
}
