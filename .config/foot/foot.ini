font=CaskaydiaCoveNerdFont:size=13
font-size-adjustment=1.0

resize-by-cells=yes
resize-keep-grid=yes
resize-delay-ms=100
pad=10x10 center-when-maximized-and-fullscreen

[scrollback]
lines=2000
multiplier=3.0
indicator-position=relative
indicator-format=""

[cursor]
style=beam
blink=yes
blink-rate=500
beam-thickness=1.5

[mouse]
hide-when-typing=yes
# alternate-scroll-mode=yes

[colors]
# Gruvbox Dark color scheme
background=282828
foreground=ebdbb2

# Normal colors
regular0=282828  # black
regular1=cc241d  # red
regular2=98971a  # green
regular3=d79921  # yellow
regular4=458588  # blue
regular5=b16286  # magenta
regular6=689d6a  # cyan
regular7=a89984  # white

# Bright colors
bright0=928374   # bright black
bright1=fb4934   # bright red
bright2=b8bb26   # bright green
bright3=fabd2f   # bright yellow
bright4=83a598   # bright blue
bright5=d3869b   # bright magenta
bright6=8ec07c   # bright cyan
bright7=ebdbb2   # bright white

# Selection colors
selection-background=504945
selection-foreground=ebdbb2

# URL colors
urls=83a598
